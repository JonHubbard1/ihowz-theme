name: Release Theme

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read theme version from style.css
        id: version
        run: |
          THEME_VERSION=$(grep -E "^Version:" style.css | sed -E 's/^Version:[[:space:]]*//')
          if [ -z "$THEME_VERSION" ]; then
            echo "Could not read theme version from style.css" >&2
            exit 1
          fi
          echo "version=$THEME_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$THEME_VERSION" >> $GITHUB_OUTPUT
          echo "Theme version: $THEME_VERSION"

      - name: Ensure tag exists
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
          else
            git tag -a "$TAG" -m "Release $TAG"
          fi
          git push origin "$TAG" || true

      - name: Build release zip
        run: |
          mkdir -p dist
          THEME_SLUG="ihowz"
          mkdir -p "$THEME_SLUG"
          # Copy tracked files into the theme folder so WordPress extracts into wp-content/themes/ihowz/
          git ls-files | tar -cf - -T - | tar -xf - -C "$THEME_SLUG"
          zip -r "dist/ihowz-theme-${{ steps.version.outputs.version }}.zip" "$THEME_SLUG" \
            -x '*.git*' \
            -x '*/.github/*' \
            -x 'node_modules/*' \
            -x 'dist/*' \
            -x '*.log'

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: iHowz Theme ${{ steps.version.outputs.version }}
          files: dist/ihowz-theme-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
